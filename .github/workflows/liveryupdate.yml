name: Livery updates

on:
  push:
    branches:
      - main
    paths:
      - 'livery.json'
  workflow_dispatch:

jobs:
  run:
    if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run script
        env:
          LIVERY_UPDATE_WEBHOOK: ${{ secrets.GITHUB }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          python3 liveryupdate.py

      - name: Update commit id
        run: |
          mkdir -p .webhook
          echo "${{ github.sha }}" > .webhook/commit.txt

      - name: Commit commit.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .webhook/commit.txt
          git commit -m "update commit id" || exit 0
          git push
