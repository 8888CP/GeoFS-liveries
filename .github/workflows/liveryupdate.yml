name: Livery updates

on:
  push:
    branches:
      - main
    paths:
      - 'livery.json'
  workflow_dispatch:

jobs:
  run:
    if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ 安装依赖（关键）
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install discord-webhook requests

      # ✅ 运行脚本（注意目录）
      - name: Run script
        working-directory: .webhook
        env:
          LIVERY_UPDATE_WEBHOOK: ${{ secrets.LIVERY_UPDATE_WEBHOOK }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          python3 liveryupdate.py

      # ✅ 更新 commit id
      - name: Update commit id
        run: |
          mkdir -p .webhook
          echo "${{ github.sha }}" > .webhook/commit.txt

      # ✅ 提交 commit.txt
      - name: Commit commit id
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .webhook/commit.txt
          git commit -m "update commit id" || exit 0
          git push
        
